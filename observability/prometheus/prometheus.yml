global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: recommendation-api
    metrics_path: /metrics
    static_configs:
      - targets: ["recommendation-api:8000"]

  - job_name: event-generator
    static_configs:
      - targets: ["event-generator:9001"]

  - job_name: stream-processor
    static_configs:
      - targets: ["stream-processor:9002"]

  - job_name: trainer
    static_configs:
      - targets: ["trainer:9003"]
