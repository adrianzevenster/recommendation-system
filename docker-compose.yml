version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys -d recsys"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:v24.2.10
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      - "19092:19092"
      - "9644:9644"

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  create-bucket:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
      until /usr/bin/mc alias set local http://minio:9000 minio minio123; do sleep 2; done;
      /usr/bin/mc mb -p local/raw-events || true;
      exit 0;'

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - recommendation-api
      - event-generator
      - stream-processor
      - trainer

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger

  seeder:
    build:
      context: .
      dockerfile: services/seeder/Dockerfile
    environment:
      SERVICE_NAME: seeder
      POSTGRES_HOST: postgres
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
    depends_on:
      postgres:
        condition: service_healthy

  trainer:
    build:
      context: .
      dockerfile: services/trainer/Dockerfile
    environment:
      SERVICE_NAME: trainer
      METRICS_PORT: 9003
      POSTGRES_HOST: postgres
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully
    ports:
      - "9003:9003"

  stream-processor:
    build:
      context: .
      dockerfile: services/stream_processor/Dockerfile
    environment:
      SERVICE_NAME: stream-processor
      METRICS_PORT: 9002
      POSTGRES_HOST: postgres
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_GROUP_ID: stream-processor
      KAFKA_TOPIC_EVENTS: user-events
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: raw-events
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redpanda:
        condition: service_started
      create-bucket:
        condition: service_completed_successfully
      seeder:
        condition: service_completed_successfully
    ports:
      - "9002:9002"

  event-generator:
    build:
      context: .
      dockerfile: services/event_generator/Dockerfile
    environment:
      SERVICE_NAME: event-generator
      METRICS_PORT: 9001
      POSTGRES_HOST: postgres
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC_EVENTS: user-events
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      seeder:
        condition: service_completed_successfully
    ports:
      - "9004:9001"

  recommendation-api:
    build:
      context: .
      dockerfile: services/recommendation_api/Dockerfile
    environment:
      SERVICE_NAME: recommendation-api
      API_PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_DB: recsys
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      trainer:
        condition: service_started
      stream-processor:
        condition: service_started
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  minio_data:
